# pull-request.yml
name: pull-request
on:
  pull_request:
    types: [opened, reopened, synchronize]
permissions:
  contents: read
  pull-requests: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
      - name: Restore make checks cache
        id: make-checks-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: /tmp/make-checks
          key: ${{ runner.os }}-make-checks-${{ github.event.pull_request.head.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-make-checks-${{ github.event.pull_request.head.ref }}-
            ${{ runner.os }}-make-checks-
      - run: make checks
      - name: Save make checks cache
        if: always() && steps.make-checks-cache-restore.outputs.cache-matched-key != format('{0}-make-checks-{1}-{2}', runner.os, github.event.pull_request.head.ref, github.sha)
        uses: actions/cache/save@v4
        with:
          path: /tmp/make-checks
          key: ${{ runner.os }}-make-checks-${{ github.event.pull_request.head.ref }}-${{ github.sha }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=sha
            type=ref,event=tag
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        uses: docker/build-push-action@v6
        with:
          push: false
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
