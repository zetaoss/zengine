root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server-main ./cmd/server/main.go"
bin = "./tmp/server-main"
include_ext = ["go", "tpl", "tmpl", "html", "sql"]
exclude_dir = ["tmp", "vendor", "node_modules"]
delay = 1000
stop_on_error = true
log = "air.log"

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
