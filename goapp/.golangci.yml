version: "2"

linters:
  enable:
    - bodyclose
    - copyloopvar
    # - depguard
    - dogsled
    - dupl
    - errcheck
    - errorlint
    # - funlen
    - gocheckcompilerdirectives
    - gochecknoinits
    # - goconst
    - gocritic
    - gocyclo
    - godox
    # - mnd
    - goprintffuncname
    # - gosec
    - govet
    - intrange
    - ineffassign
    # - lll
    - misspell
    - nakedret
    # - noctx
    - nolintlint
    # - revive
    - staticcheck
    - testifylint
    - unconvert
    # - unparam
    - unused
    - whitespace
